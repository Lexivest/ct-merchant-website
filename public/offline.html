<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTMerchant Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --ink: #0f172a;
        --muted: #64748b;
        --line: rgba(148, 163, 184, 0.24);
        --accent: #0f172a;
        --accent-soft: rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at top, rgba(14, 165, 233, 0.12), transparent 34%),
          linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: var(--ink);
      }

      .card {
        width: min(100%, 460px);
        padding: 32px 28px;
        border-radius: 32px;
        background: var(--card);
        border: 1px solid var(--line);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .badge {
        width: 76px;
        height: 76px;
        margin: 0 auto 20px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        box-shadow: 0 18px 32px rgba(15, 23, 42, 0.18);
        color: #fff;
        font-size: 30px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      p {
        margin: 16px 0 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 15px;
      }

      .status {
        margin-top: 22px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #f97316;
        box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.16);
      }

      .actions {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 18px;
        padding: 14px 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease, background 140ms ease;
      }

      button:active {
        transform: scale(0.98);
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: #eef2f7;
        color: #334155;
      }

      .tips {
        margin-top: 22px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Wi</div>
      <h1>Internet Needed</h1>
      <p>
        CTMerchant could not finish opening because this device is currently offline.
        Reconnect to the internet and the app will try again automatically.
      </p>
      <div class="status" id="status">
        <span class="dot"></span>
        <span id="statusText">Offline</span>
      </div>
      <div class="actions">
        <button class="primary" id="retryButton" type="button">Retry now</button>
        <button class="secondary" id="homeButton" type="button">Open home when ready</button>
      </div>
      <div class="tips">Installed app mode is listening for your connection to return.</div>
    </main>

    <script>
      const retryButton = document.getElementById("retryButton");
      const homeButton = document.getElementById("homeButton");
      const statusText = document.getElementById("statusText");

      function reloadApp(target) {
        window.location.href = target || window.location.href;
      }

      function handleOnline() {
        statusText.textContent = "Back online";
        window.setTimeout(() => {
          reloadApp(window.location.pathname === "/offline.html" ? "/" : window.location.href);
        }, 180);
      }

      retryButton.addEventListener("click", () => reloadApp(window.location.href));
      homeButton.addEventListener("click", () => reloadApp("/"));
      window.addEventListener("online", handleOnline);
    </script>
  </body>
</html>
