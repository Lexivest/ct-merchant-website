# Netlify configuration

# Edge function: inject per-shop OG meta tags for social-media bots so that
# WhatsApp / Facebook / Telegram previews show the shop logo + name instead of
# the generic CTMerchant logo.
[[edge_functions]]
  path = "/shop-detail"
  function = "shop-og"

[[edge_functions]]
  path = "/service-provider"
  function = "shop-og"
