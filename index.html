    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #E3E6E6;
      }

      #root {
        min-height: 100vh;
        background: #E3E6E6;
      }

      /* Boot splash — visually identical to React's PageLoadingScreen + CTMLoader(sm) */
      .ctm-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #E3E6E6;
      }

      /* CTMLoader sm: 48×48px container */
      .ctm-boot-spinner {
        position: relative;
        width: 48px;
        height: 48px;
      }

      /* Outer static ring — pink-200/70 */
      .ctm-boot-ring-outer {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(249, 168, 212, 0.7);
      }

      /* Outer spinning ring — border-t pink-600, border-r violet-700 */
      .ctm-boot-ring-spin {
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #db2777;
        border-right-color: #7c3aed;
        animation: ctmBootSpin 1.15s linear infinite;
      }

      /* Inner counter-spinning ring — border-b pink-500, border-l purple-600 */
      .ctm-boot-ring-reverse {
        position: absolute;
        inset: 7px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-bottom-color: #ec4899;
        border-left-color: #9333ea;
        animation: ctmBootSpinReverse 1.5s linear infinite;
      }

      /* Center label */
      .ctm-boot-center {
        position: absolute;
        inset: 13px;
        border-radius: 50%;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14);
      }

      .ctm-boot-label {
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        color: #131921;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      @keyframes ctmBootSpin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      @keyframes ctmBootSpinReverse {
        from { transform: rotate(360deg); }
        to   { transform: rotate(0deg); }
      }
    </style>
