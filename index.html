    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f8fafc;
        overscroll-behavior-y: none;
      }

      #root {
        min-height: 100vh;
        background: #f8fafc;
      }

      .ctm-boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .ctm-boot-card {
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        padding: 12px 18px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }

      .ctm-boot-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #db2777;
        animation: ctmBootPulse 1.2s ease-in-out infinite;
      }

      .ctm-boot-text {
        font-size: 14px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      @keyframes ctmBootPulse {
        0%, 100% {
          opacity: 0.45;
          transform: scale(0.82);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CTMerchant",
        "url": "https://www.ctmerchant.com.ng/",
        "logo": "https://www.ctmerchant.com.ng/ctm-logo.jpg",
        "sameAs": [],
        "description": "Repository of verified physical shops, products, and services."
      }
    </script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root">
      <div class="ctm-boot" aria-label="Opening CTMerchant">
        <div class="ctm-boot-card">
          <span class="ctm-boot-dot"></span>
          <span class="ctm-boot-text">
            <span style="color:#db2777;">C</span><span style="color:#4c1d95;">T</span><span style="color:#2563eb;">M</span>erchant is opening
          </span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
