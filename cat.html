<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Category | CT-Merchant</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            /* PREMIUM AMAZON THEME WITH CT-MERCHANT PINK */
            --amz-dark: #131921;
            
            --color-pink: #db2777; 
            --color-pink-hover: #be185d;
            --color-pink-light: rgba(219, 39, 119, 0.15);
            
            --amz-bg: #F3F4F6;
            --color-text-main: #0F1111;
            --color-text-muted: #565959;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--amz-bg); 
            color: var(--color-text-main);
            overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- PREMIUM HEADER --- */
        .app-header {
            background-color: var(--amz-dark);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .back-btn { 
            background: none; border: none; color: white; 
            font-size: 1.2rem; cursor: pointer; padding: 4px; 
            margin-left: -4px; transition: 0.2s;
        }
        .back-btn:hover { color: var(--color-pink); }
        
        .page-title { font-weight: 700; font-size: 1.15rem; letter-spacing: 0.5px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- CONTENT BODY --- */
        .content-body {
            max-width: 1200px; 
            margin: 0 auto;
            width: 100%;
            padding: 24px 20px; 
            flex: 1;
        }

        .category-header {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .category-icon-box {
            width: 48px; height: 48px; border-radius: 8px;
            background: var(--color-pink-light); color: var(--color-pink);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .category-title { font-size: 1.4rem; font-weight: 800; color: #0F1111; }
        .shop-count { font-size: 0.9rem; color: var(--color-text-muted); font-weight: 600; margin-top: 2px;}

        /* =========================================
           ZERO-GAP PREMIUM SHOP CARDS (2x2 GRID)
           ========================================= */
        .shop-list-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .premium-shop-card-wrap {
            display: flex;
            flex-direction: column;
        }

        .premium-shop-card {
            background: white;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            height: 100%;
            border-radius: 8px; 
            border: 1px solid #D5D9D9;
            transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .premium-shop-card:hover { 
            background: #Fcfcfc; 
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            border-color: #B0B5B5;
        }

        .shop-card-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: #0F1111;
            margin-bottom: 16px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Enforce Grid Integrity */
        .shop-image-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            flex: 1;
            width: 100%;
        }

        .shop-grid-item-wrap {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            overflow: hidden;
        }

        /* Strictly Enforced 1:1 Aspect Ratio Block */
        .shop-grid-item {
            width: 100%;
            aspect-ratio: 1 / 1; 
            background: #F7F7F7;
            display: block;
            overflow: hidden;
            border-radius: 4px;
            position: relative;
        }

        .shop-grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* --- SPECIAL OFFER ANIMATIONS --- */
        @keyframes pulse-badge {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 0 4px rgba(220, 38, 38, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        @keyframes highlight-price {
            0%, 100% { color: var(--color-pink); text-shadow: none; }
            50% { color: #ff0055; text-shadow: 0 0 6px rgba(219,39,119,0.4); }
        }

        .grid-badge {
            position: absolute;
            top: 4px; left: 4px;
            background: #DC2626;
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 4px;
            border-radius: 4px;
            z-index: 2;
        }
        
        .flash-offer { animation: pulse-badge 1.5s infinite ease-in-out; }
        .flash-price { animation: highlight-price 1.5s infinite ease-in-out; }

        .shop-grid-item.empty { border: 1px dashed #D5D9D9; display: flex; align-items: center; justify-content: center; }

        .shop-grid-caption {
            display: flex;
            flex-direction: column;
        }
        
        .sg-name {
            font-size: 0.75rem;
            color: #0F1111;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .sg-price {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--color-pink);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .sg-price-old {
            text-decoration: line-through; 
            color: #888C8C; 
            font-size: 0.65rem; 
            font-weight: 500; 
            margin-right: 4px;
        }

        .shop-cta {
            font-size: 0.85rem;
            color: var(--amz-link);
            font-weight: 600;
            display: inline-flex;
            text-decoration: none;
            margin-top: auto;
        }
        .premium-shop-card:hover .shop-cta { color: var(--amz-link-hover); text-decoration: underline; }

        /* States */
        .state-box { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #888C8C; text-align: center; padding: 60px 20px;
            background: white; border-radius: 8px; border: 1px solid #D5D9D9;
        }

        .spinner { width: 44px; height: 44px; border: 4px solid var(--color-pink-light); border-top-color: var(--color-pink); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- TOP SECTION -->
    <header class="app-header">
        <div class="header-content">
            <button class="back-btn" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i></button>
            <div id="header-title" class="page-title">Category</div>
        </div>
    </header>

    <!-- CONTENT BODY -->
    <main class="content-body">
        
        <div id="loader" class="state-box" style="background:transparent; border:none; padding-top: 100px;">
            <div class="spinner"></div>
            <span style="font-weight: 600; color: #0F1111;">Loading Shops...</span>
        </div>

        <div id="content-area" style="display: none;">
            
            <div class="category-header">
                <div class="category-icon-box">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div>
                    <div id="cat-title" class="category-title">Category Name</div>
                    <div id="cat-count" class="shop-count">0 stores found in your city</div>
                </div>
            </div>

            <div id="shop-list" class="shop-list-view">
                <!-- JS injected shop cards -->
            </div>

        </div>
    </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://xdchacdjcgazyckacbpc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkY2hhY2RqY2dhenlja2FjYnBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1NDA2MzMsImV4cCI6MjA4NTExNjYzM30.41V3RaUX-ii-EHysbcVpUCgm0-RsNmuOb8FmYsz72Ow";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const catName = params.get('name');

    window.onload = async () => {
        if (!catName) { window.history.back(); return; }
        
        document.getElementById('header-title').textContent = catName;
        document.getElementById('cat-title').textContent = catName;

        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = "index.html"; return; }

        fetchCategoryData(session.user.id);
    };

    async function fetchCategoryData(userId) {
        try {
            // 1. Get User City
            const { data: profile } = await client.from('profiles').select('city_id').eq('id', userId).single();
            if (!profile || !profile.city_id) throw new Error("City not found");

            // 2. Fetch Verified Shops in this Category and City
            const { data: shops, error: shopErr } = await client
                .from('shops')
                .select('*')
                .eq('city_id', profile.city_id)
                .eq('category', catName)
                .eq('is_verified', true)
                .order('name', { ascending: true });

            if (shopErr) throw shopErr;

            // 3. Fetch Products for these shops to build the grids
            let products = [];
            if (shops && shops.length > 0) {
                const shopIds = shops.map(s => s.id);
                const { data: prods } = await client
                    .from('products')
                    .select('*')
                    .in('shop_id', shopIds)
                    .eq('is_available', true);
                
                products = prods || [];
            }

            renderCategory(shops || [], products);

        } catch (e) {
            console.error(e);
            renderError("Failed to load category data.");
        }
    }

    function renderCategory(shops, products) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content-area').style.display = 'block';

        document.getElementById('cat-count').textContent = `${shops.length} verified stores found in your city`;

        const listContainer = document.getElementById('shop-list');

        if (shops.length === 0) {
            listContainer.style.display = 'block';
            listContainer.innerHTML = `
                <div class="state-box">
                    <i class="fa-solid fa-store-slash" style="font-size: 3rem; margin-bottom: 16px; opacity: 0.3;"></i>
                    <span style="font-weight: 800; color: #0F1111; font-size: 1.1rem;">No stores found</span>
                    <span style="font-size: 0.9rem; margin-top: 6px;">There are no verified stores for ${catName} in your area yet.</span>
                    <button onclick="history.back()" style="margin-top:20px; padding:10px 24px; background: white; border: 1px solid #D5D9D9; border-radius: 6px; font-weight: 600; cursor:pointer;">Go Back</button>
                </div>
            `;
            return;
        }

        listContainer.innerHTML = shops.map(shop => buildShopCard(shop, products)).join('');
    }

    // =========================================
    // PREMIUM AMAZON-STYLE SHOP CARD BUILDER
    // =========================================
    function buildShopCard(shop, allProducts) {
        // Exclude "Fairly Used" items from the front card 
        const p = allProducts.filter(x => x.shop_id === shop.id && x.image_url && x.condition !== 'Fairly Used').slice(0, 4);

        let gridHtml = '';
        
        for (let i = 0; i < 4; i++) {
            if (i < p.length) {
                const prodName = p[i].name || p[i].product_name || p[i].title || 'Product';
                
                const price = p[i].price || p[i].product_price;
                const discount = p[i].discount_price;
                const hasDiscount = discount && discount < price;
                const percent = hasDiscount ? Math.round(((price - discount)/price)*100) : 0;
                
                let priceHtml = '';
                let priceClass = 'sg-price';
                
                if (hasDiscount) {
                    priceHtml = `<span class="sg-price-old">₦${price.toLocaleString()}</span>₦${discount.toLocaleString()}`;
                    priceClass = 'sg-price flash-price'; 
                } else if (price) {
                    priceHtml = `₦${price.toLocaleString()}`;
                }

                gridHtml += `
                    <div class="shop-grid-item-wrap">
                        <div class="shop-grid-item">
                            <img src="${p[i].image_url}" alt="Product" loading="lazy">
                            ${hasDiscount ? `<div class="grid-badge flash-offer">-${percent}%</div>` : ''}
                        </div>
                        <div class="shop-grid-caption">
                            <div class="sg-name" title="${prodName}">${prodName}</div>
                            <div class="${priceClass}">${priceHtml}</div>
                        </div>
                    </div>
                `;
            } else {
                gridHtml += `
                    <div class="shop-grid-item-wrap">
                        <div class="shop-grid-item empty">
                            <i class="fa-solid fa-image" style="color: #E5E7EB; font-size: 1.2rem;"></i>
                        </div>
                        <div class="shop-grid-caption" style="color:transparent; user-select:none;">
                            <div class="sg-name">-</div>
                            <div class="sg-price">-</div>
                        </div>
                    </div>
                `;
            }
        }

        return `
            <div class="premium-shop-card-wrap">
                <div class="premium-shop-card" onclick="window.location.href='shop-detail.html?id=${shop.id}'">
                    <div class="shop-card-title">${shop.name} <i class="fa-solid fa-circle-check" style="color:#007185; font-size:0.9rem; margin-left:4px;" title="Verified"></i></div>
                    <div class="shop-image-grid">
                        ${gridHtml}
                    </div>
                    <div class="shop-cta">Visit shop <i class="fa-solid fa-chevron-right" style="font-size: 0.75rem;"></i></div>
                </div>
            </div>
        `;
    }

    function renderError(msg) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content-area').style.display = 'block';
        document.getElementById('content-area').innerHTML = `
            <div class="state-box">
                <i class="fa-solid fa-triangle-exclamation" style="font-size: 2.5rem; margin-bottom: 16px; color: #C40000;"></i>
                <span style="font-weight: 800; color: #0F1111; font-size: 1.2rem;">An error occurred</span>
                <span style="font-size: 0.9rem; margin-top: 6px;">${msg}</span>
                <button onclick="location.reload()" style="margin-top:20px; padding:10px 24px; background: white; border: 1px solid #D5D9D9; border-radius: 6px; font-weight: 600; cursor:pointer;">Tap to Retry</button>
            </div>
        `;
    }
</script>
</body>
</html>
