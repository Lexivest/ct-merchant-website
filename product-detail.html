<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | CT‑Merchant</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            /* PREMIUM AMAZON THEME WITH CT-MERCHANT PINK */
            --amz-dark: #131921;
            --amz-nav-bar: #232F3E;
            
            --color-pink: #db2777; 
            --color-pink-hover: #be185d;
            --color-pink-light: rgba(219, 39, 119, 0.1);
            
            --amz-bg: #E3E6E6; /* Classic Amazon Gray Separator */
            --color-text-main: #0F1111;
            --color-text-muted: #565959;
            --color-border: #D5D9D9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--amz-bg); 
            color: var(--color-text-main); 
            padding-bottom: 90px; /* Space for bottom sticky bar */
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: var(--amz-bg);
            display: flex;
            flex-direction: column;
        }

        /* --- PREMIUM HEADER --- */
        .amz-header {
            background-color: var(--amz-dark);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow: hidden;}
        .back-btn { 
            background: none; border: none; color: white; 
            font-size: 1.2rem; cursor: pointer; padding: 4px; 
            margin-left: -4px; transition: 0.2s; flex-shrink: 0;
        }
        .back-btn:hover { color: var(--color-pink); }
        .page-title { font-weight: 700; font-size: 1.15rem; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .header-actions { display: flex; gap: 16px; align-items: center; flex-shrink: 0;}
        .action-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { color: var(--color-pink); }
        .action-btn.active { color: var(--color-pink); }

        /* --- AMAZON BLOCK LAYOUT --- */
        .content-block {
            background: white;
            padding: 24px 20px;
            margin-bottom: 8px; /* 8px Amazon separator */
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
        }
        .content-block:first-child { border-top: none; padding-top: 0; padding-bottom: 0; } /* Image block has custom padding */

        /* --- DESKTOP SPLIT LAYOUT --- */
        .main-layout { display: flex; flex-direction: column; width: 100%; }

        @media (min-width: 900px) {
            .app-container { padding: 40px; background: transparent; }
            .main-layout { 
                flex-direction: row; 
                gap: 24px; 
                background: transparent;
            }
            .content-block { 
                border-radius: 8px; 
                border: 1px solid var(--color-border); 
                margin-bottom: 24px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            }
            .content-block:first-child { padding: 0; }
            .left-col { flex: 1; }
            .right-col { flex: 1.2; display: flex; flex-direction: column; }
        }

        /* --- IMAGE BLOCK --- */
        .image-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1 / 1;
            max-height: 500px;
            background: #F7F7F7; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .product-img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Ensures 100% visibility without cropping */
            padding: 20px; 
            transition: transform 0.3s; 
        }
        @media (min-width: 900px) { .product-img:hover { transform: scale(1.05); } }

        /* Dynamic Discount Badge on Image */
        .discount-badge-hero {
            position: absolute; bottom: 20px; left: 20px;
            background: #DC2626; color: white;
            font-size: 1.1rem; font-weight: 800;
            padding: 6px 12px; border-radius: 6px; z-index: 10;
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.3);
        }

        /* --- INFO BLOCK --- */
        .condition-badge {
            display: inline-block; padding: 4px 10px; border-radius: 4px;
            font-size: 0.75rem; font-weight: 800; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .cond-new { background: #F3F4F6; color: #007185; border: 1px solid #D5D9D9; }
        .cond-used { background: #FFF7ED; color: #C40000; border: 1px solid #F3A847; }

        .prod-title { font-size: 1.5rem; font-weight: 800; line-height: 1.3; margin-bottom: 12px; color: var(--color-text-main); }
        
        .price-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
        .current-price { font-size: 2.2rem; font-weight: 800; color: var(--color-pink); }
        .old-price { text-decoration: line-through; color: var(--color-text-muted); font-size: 1.2rem; font-weight: 500;}

        /* --- DESCRIPTION BLOCK --- */
        .section-header { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; color: var(--color-text-main); border-bottom: 2px solid #F3F4F6; padding-bottom: 8px;}
        .description-text { font-size: 0.95rem; line-height: 1.7; color: var(--color-text-muted); white-space: pre-wrap;}

        /* Animations */
        @keyframes pulse-badge { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 50% { transform: scale(1.05); box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        @keyframes highlight-price { 0%, 100% { color: var(--color-pink); text-shadow: none; } 50% { color: #ff0055; text-shadow: 0 0 8px rgba(219,39,119,0.3); } }
        
        .flash-offer { animation: pulse-badge 1.5s infinite ease-in-out; }
        .flash-price { animation: highlight-price 1.5s infinite ease-in-out; }

        /* --- BOTTOM BAR --- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 1200px;
            background: white; padding: 12px 20px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.08); z-index: 100;
            border-top: 1px solid var(--color-border); display: flex; justify-content: center;
        }
        .btn-whatsapp {
            width: 100%; max-width: 600px;
            background: #25D366; color: white;
            padding: 14px; border-radius: 8px; border: none;
            font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; transition: 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btn-whatsapp:hover { background: #16A34A; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(19, 25, 33, 0.8); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s; backdrop-filter: blur(2px);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-card { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); border: 1px solid var(--color-border);}
        
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .btn-cancel { background: white; border: 1px solid var(--color-border); color: var(--color-text-main); }
        .btn-cancel:hover { background: #F7FAFA; }
        .btn-confirm { background: #25D366; color: white; }
        .btn-confirm:hover { background: #16A34A; }

        /* Utility States */
        .hidden { display: none !important; }
        .state-box { text-align: center; padding: 60px 20px; color: var(--color-text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;}
        .spinner { width: 44px; height: 44px; border: 4px solid var(--color-pink-light); border-top-color: var(--color-pink); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Premium Header -->
    <header class="amz-header">
        <div class="header-left">
            <button onclick="history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
            <span class="page-title">Product Details</span>
        </div>
        <div class="header-actions">
            <button id="wishlist-btn" onclick="toggleWishlist()" class="action-btn">
                <i id="fav-icon" class="fa-regular fa-heart"></i>
            </button>
            <button onclick="shareProduct()" class="action-btn">
                <i class="fa-solid fa-share-nodes"></i>
            </button>
        </div>
    </header>

    <!-- Loading State -->
    <div id="loader" class="state-box">
        <div class="spinner"></div>
        <span style="font-weight: 600; color: #0F1111;">Loading Product...</span>
    </div>

    <!-- Error State -->
    <div id="error-screen" class="state-box hidden">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: #C40000; margin-bottom: 16px;"></i>
        <h3 style="color:#0F1111; font-weight: 800; margin-bottom: 8px;">Product Not Found</h3>
        <p style="color:#565959;">The item you are looking for may have been removed.</p>
        <button onclick="history.back()" style="margin-top:20px; padding:10px 24px; background: white; border: 1px solid #D5D9D9; border-radius: 6px; font-weight: 600; cursor:pointer;">Go Back</button>
    </div>

    <!-- Main Content Layout -->
    <div id="main-content" class="main-layout hidden">
        
        <div class="left-col">
            <!-- Header Image Area (Block 1) -->
            <div class="content-block image-container">
                <img id="prod-img" class="product-img" src="" alt="Product Image">
                <div id="discount-badge" class="discount-badge-hero flash-offer hidden"></div>
            </div>
        </div>
        
        <div class="right-col">
            <!-- Details Area (Block 2) -->
            <div class="content-block">
                <span id="condition-badge" class="condition-badge cond-new">New</span>
                <h1 id="prod-name" class="prod-title">--</h1>
                <div class="price-row">
                    <span id="current-price" class="current-price">--</span>
                    <span id="old-price" class="old-price hidden"></span>
                </div>
            </div>

            <!-- Description Area (Block 3) -->
            <div class="content-block" style="flex: 1;">
                <div class="section-header">Description</div>
                <p id="prod-desc" class="description-text">--</p>
                
                <div style="margin-top: 30px; font-size: 0.85rem; color: #888C8C; display: flex; align-items: center; gap: 6px;">
                    <i class="fa-solid fa-store" style="color: var(--color-pink);"></i> Sold by <span id="shop-name-link" style="font-weight: 700; cursor: pointer; color: #007185; text-decoration: underline;">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Sticky Footer -->
    <div class="bottom-bar" id="bottom-action-bar" style="display:none;">
        <button onclick="showSecurityModal()" class="btn-whatsapp">
            <i class="fa-brands fa-whatsapp" style="font-size: 1.4rem;"></i> Message Merchant
        </button>
    </div>
</div>

<!-- Security Modal -->
<div id="security-modal" class="modal-overlay">
    <div class="modal-card">
        <div style="width: 64px; height: 64px; background: var(--color-pink-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
            <i class="fa-solid fa-shield-halved" style="font-size: 1.8rem; color: var(--color-pink);"></i>
        </div>
        <h3 style="margin-bottom: 10px; font-size: 1.25rem; color: #0F1111; font-weight: 800;">Security Notice</h3>
        <p style="font-size: 0.9rem; color: #565959; line-height: 1.5;">
            To protect merchants from spam, your User ID will be securely recorded. Please ensure this inquiry is business-related.
        </p>
        <div class="modal-actions">
            <button class="btn-modal btn-cancel" onclick="hideSecurityModal()">Cancel</button>
            <button class="btn-modal btn-confirm" onclick="launchWhatsApp()">Continue to Chat</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://xdchacdjcgazyckacbpc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkY2hhY2RqY2dhenlja2FjYnBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1NDA2MzMsImV4cCI6MjA4NTExNjYzM30.41V3RaUX-ii-EHysbcVpUCgm0-RsNmuOb8FmYsz72Ow";
    
    let client;
    let currentProduct = null;
    let currentShop = null;
    let currentUser = null;
    let isInWishlist = false;

    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    // --- INSTANT SWR INIT ---
    window.onload = async () => {
        if (typeof supabase === 'undefined') { return; }
        client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        if (!productId) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
            return;
        }

        // 1. Check Session
        const { data: { session } } = await client.auth.getSession();
        if (session) currentUser = session.user;

        // 2. Global Product Cache (Safe across users)
        const cacheKey = `ctm_prod_v30_${productId}`;
        const cacheStr = localStorage.getItem(cacheKey);

        if (cacheStr) {
            try {
                const cachedData = JSON.parse(cacheStr);
                renderUI(cachedData);
                if (currentUser) checkWishlistStatus();
            } catch (e) {
                console.error("Cache error", e);
                document.getElementById('loader').style.display = 'flex';
            }
        } else {
            document.getElementById('loader').style.display = 'flex';
        }

        // 3. Fetch Fresh Data
        fetchFreshData(cacheKey, cacheStr);
    };

    async function fetchFreshData(cacheKey, oldCacheStr) {
        try {
            const { data: product, error } = await client.from('products').select('*').eq('id', productId).single();
            if (error || !product) throw new Error();
            
            currentProduct = product;
            let shopData = null;

            if (product.shop_id) {
                const { data: shop } = await client.from('shops').select('id, name, whatsapp').eq('id', product.shop_id).single();
                currentShop = shop;
                shopData = shop;
            }

            const newData = { product, shop: shopData };
            const newCacheStr = JSON.stringify(newData);

            if (newCacheStr !== oldCacheStr) {
                localStorage.setItem(cacheKey, newCacheStr);
                renderUI(newData);
            }

            // If we didn't have cache initially, fetch user specific status now
            if (!oldCacheStr && currentUser) {
                checkWishlistStatus();
            }

        } catch (e) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
        }
    }

    function renderUI(data) {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');

        currentProduct = data.product;
        currentShop = data.shop;
        const p = data.product;

        document.getElementById('prod-img').src = p.image_url || 'https://via.placeholder.com/600x600?text=No+Image';
        
        const badge = document.getElementById('condition-badge');
        badge.textContent = p.condition || 'New';
        badge.className = p.condition === 'Fairly Used' ? 'condition-badge cond-used' : 'condition-badge cond-new';

        document.getElementById('prod-name').textContent = p.name;
        document.getElementById('prod-desc').textContent = p.description || "No description provided by the merchant.";

        const priceEl = document.getElementById('current-price');
        const oldEl = document.getElementById('old-price');
        const dBadge = document.getElementById('discount-badge');
        const formatPrice = (val) => "₦" + Number(val).toLocaleString();

        if (p.discount_price && p.discount_price < p.price) {
            const percent = Math.round(((p.price - p.discount_price) / p.price) * 100);
            
            priceEl.textContent = formatPrice(p.discount_price);
            priceEl.classList.add('flash-price'); // Active premium glow
            
            oldEl.textContent = formatPrice(p.price);
            oldEl.classList.remove('hidden');
            
            dBadge.textContent = `-${percent}% OFF`;
            dBadge.classList.remove('hidden');
        } else {
            priceEl.textContent = formatPrice(p.price);
            priceEl.classList.remove('flash-price');
            oldEl.classList.add('hidden');
            dBadge.classList.add('hidden');
        }

        // Setup Shop Link & WhatsApp Action
        if (currentShop) {
            const shopLink = document.getElementById('shop-name-link');
            shopLink.textContent = currentShop.name;
            shopLink.onclick = () => window.location.href = `shop-detail.html?id=${currentShop.id}`;

            if (currentShop.whatsapp) {
                document.getElementById('bottom-action-bar').style.display = 'flex';
            }
        }
    }

    async function checkWishlistStatus() {
        if (!currentUser) return;
        try {
            const { data } = await client.from('wishlist').select('id').eq('user_id', currentUser.id).eq('product_id', productId).maybeSingle();
            if (data) {
                isInWishlist = true;
                updateWishlistIcons();
            }
        } catch (e) { console.error("Wishlist check error", e); }
    }

    function updateWishlistIcons() {
        const btn = document.getElementById('wishlist-btn');
        const icon = document.getElementById('fav-icon');
        
        const type = isInWishlist ? 'fa-solid' : 'fa-regular';

        icon.className = `${type} fa-heart`;
        if (isInWishlist) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    }

    async function toggleWishlist() {
        if (!currentUser) return alert("Please login to save items to your wishlist.");
        
        isInWishlist = !isInWishlist;
        updateWishlistIcons();

        try {
            if (isInWishlist) {
                await client.from('wishlist').insert({ user_id: currentUser.id, product_id: productId });
            } else {
                await client.from('wishlist').delete().eq('user_id', currentUser.id).eq('product_id', productId);
            }
        } catch (e) {
            // Revert on error
            isInWishlist = !isInWishlist;
            updateWishlistIcons();
            alert("Failed to update wishlist.");
        }
    }

    function showSecurityModal() {
        if (!currentShop?.whatsapp) return alert("This merchant hasn't provided a WhatsApp number.");
        document.getElementById('security-modal').classList.add('active');
    }
    
    function hideSecurityModal() {
        document.getElementById('security-modal').classList.remove('active');
    }

    async function launchWhatsApp() {
        hideSecurityModal();
        if (currentUser && currentShop) {
            client.from('whatsapp_clicks').insert({ clicker_id: currentUser.id, shop_id: currentShop.id, product_id: productId });
        }
        
        let phone = currentShop.whatsapp.replace(/\D/g, '');
        if (phone.startsWith('0')) phone = '234' + phone.substring(1);
        
        const price = currentProduct.discount_price || currentProduct.price;
        const msg = `Hello *${currentShop.name}*, I found this on CT-Merchant. I am interested in: ${currentProduct.name} (₦${price.toLocaleString()})`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function shareProduct() {
        if (navigator.share) {
            navigator.share({
                title: currentProduct?.name || 'Product',
                text: `Check out this product on CT-Merchant!`,
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
        }
    }
</script>
</body>
</html>
