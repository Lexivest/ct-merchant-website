<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Product Details | CTMerchant</title>

  <!-- Favicons for browser tab -->
  <link rel="icon" type="image/png" href="https://goodtvrhszsnhcyigfoi.supabase.co/storage/v1/object/public/ctm_web_files/CT-Merchant.jpg">
  <link rel="apple-touch-icon" href="https://goodtvrhszsnhcyigfoi.supabase.co/storage/v1/object/public/ctm_web_files/CT-Merchant.jpg">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root{--amz-dark:#131921;--amz-nav-bar:#232F3E;--color-pink:#db2777;--color-pink-hover:#be185d;--color-pink-light:rgba(219,39,119,.1);--amz-bg:#E3E6E6;--color-text-main:#0F1111;--color-text-muted:#565959;--color-border:#D5D9D9;--stock-ok:#007185;--stock-low:#B12704;--stock-out:#565959}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent}
    body{background-color:var(--amz-bg);color:var(--color-text-main);padding-bottom:90px;overflow-x:hidden}
    .app-container{width:100%;max-width:1200px;margin:0 auto;min-height:100vh;background-color:var(--amz-bg);display:flex;flex-direction:column}
    .amz-header{background-color:var(--amz-dark);color:#fff;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;box-shadow:0 4px 6px rgba(0,0,0,.1)}
    .header-left{display:flex;align-items:center;gap:12px;flex:1;overflow:hidden}
    .back-btn{background:0 0;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:4px;margin-left:-4px;transition:.2s;flex-shrink:0}
    .back-btn:hover{color:var(--color-pink)}
    .page-title{font-weight:700;font-size:1.15rem;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .header-actions{display:flex;gap:16px;align-items:center;flex-shrink:0}
    .action-btn{background:0 0;border:none;color:#fff;font-size:1.2rem;cursor:pointer;transition:.2s}
    .action-btn:hover,.action-btn.active{color:var(--color-pink)}
    .content-block{background:#fff;padding:24px 20px;margin-bottom:8px;border-top:1px solid var(--color-border);border-bottom:1px solid var(--color-border)}
    .content-block:first-child{border-top:none;padding-top:0;padding-bottom:0}
    .main-layout{display:flex;flex-direction:column;width:100%}
    @media (min-width:900px){.app-container{padding:40px;background:transparent}.main-layout{flex-direction:row;gap:24px;background:transparent}.content-block{border-radius:8px;border:1px solid var(--color-border);margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.04)}.content-block:first-child{padding:0}.left-col{flex:1}.right-col{flex:1.2;display:flex;flex-direction:column}}
    
    /* Image Gallery */
    .image-container{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;background:#fff;}
    .main-img-wrapper{width:100%;aspect-ratio:1/1;max-height:500px;background:#F7F7F7;display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid #F3F4F6}
    .product-img{width:100%;height:100%;object-fit:contain;padding:0;transition:transform .3s}
    @media (min-width:900px){.product-img:hover{transform:scale(1.05)}}
    .discount-badge-hero{position:absolute;top:20px;left:20px;background:#DC2626;color:#fff;font-size:1.1rem;font-weight:800;padding:6px 12px;border-radius:6px;z-index:10;box-shadow:0 4px 10px rgba(220,38,38,.3)}
    
    .thumb-gallery{display:flex;gap:12px;padding:16px;width:100%;overflow-x:auto;scrollbar-width:none}
    .thumb-gallery::-webkit-scrollbar{display:none}
    .thumb-img{width:60px;height:60px;border-radius:6px;object-fit:cover;border:2px solid transparent;cursor:pointer;background:#F7F7F7;transition:.2s;flex-shrink:0}
    .thumb-img.active{border-color:var(--color-pink);box-shadow:0 2px 8px rgba(219,39,119,.2)}

    /* Product Info */
    .condition-badge{display:inline-block;padding:4px 10px;border-radius:4px;font-size:.75rem;font-weight:800;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
    .cond-new{background:#F3F4F6;color:#007185;border:1px solid #D5D9D9}
    .cond-used{background:#FFF7ED;color:#C40000;border:1px solid #F3A847}
    .prod-title{font-size:1.4rem;font-weight:800;line-height:1.3;margin-bottom:8px;color:var(--color-text-main)}
    
    /* Stock Display */
    .stock-status{font-size:1.05rem;font-weight:700;margin-bottom:16px}
    .stock-ok{color:var(--stock-ok)}
    .stock-low{color:var(--stock-low)}
    .stock-out{color:var(--stock-out)}

    .price-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:20px}
    .current-price{font-size:2.2rem;font-weight:800;color:var(--color-pink)}
    .old-price{text-decoration:line-through;color:var(--color-text-muted);font-size:1.2rem;font-weight:500}

    /* Attributes Grid */
    .attr-grid{display:grid;grid-template-columns:1fr;gap:1px;background:var(--color-border);border:1px solid var(--color-border);border-radius:6px;overflow:hidden;margin-bottom:24px}
    .attr-row{display:flex;background:#fff;padding:12px 16px}
    .attr-key{flex:1;font-weight:700;color:var(--color-text-main);font-size:.9rem}
    .attr-val{flex:2;color:var(--color-text-muted);font-size:.9rem;font-weight:500}

    .section-header{font-size:1.1rem;font-weight:800;margin-bottom:12px;color:var(--color-text-main);border-bottom:2px solid #F3F4F6;padding-bottom:8px}
    .description-text{font-size:.95rem;line-height:1.7;color:var(--color-text-muted);white-space:pre-wrap}

    @keyframes pulse-badge{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(220,38,38,0)}50%{transform:scale(1.05);box-shadow:0 0 0 6px rgba(220,38,38,0)}}
    @keyframes highlight-price{0%,100%{color:var(--color-pink);text-shadow:none}50%{color:#f05;text-shadow:0 0 8px rgba(219,39,119,.3)}}
    .flash-offer{animation:pulse-badge 1.5s infinite ease-in-out}
    .flash-price{animation:highlight-price 1.5s infinite ease-in-out}

    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:1200px;background:#fff;padding:12px 20px;box-shadow:0 -4px 15px rgba(0,0,0,.08);z-index:100;border-top:1px solid var(--color-border);display:flex;justify-content:center}
    .btn-whatsapp{width:100%;max-width:600px;background:#25D366;color:#fff;padding:14px;border-radius:8px;border:none;font-weight:700;font-size:1.05rem;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:.2s;box-shadow:0 2px 6px rgba(0,0,0,.1)}
    .btn-whatsapp:hover:not(:disabled){background:#16A34A}
    .btn-whatsapp:disabled{background:#D5D9D9;color:#888C8C;cursor:not-allowed;box-shadow:none}

    .modal-overlay{position:fixed;inset:0;background:rgba(19,25,33,.8);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .3s;backdrop-filter:blur(2px)}
    .modal-overlay.active{opacity:1;visibility:visible}
    .modal-card{background:#fff;padding:30px;border-radius:8px;width:90%;max-width:350px;text-align:center;box-shadow:0 20px 25px -5px rgba(0,0,0,.2);border:1px solid var(--color-border)}
    .modal-actions{display:flex;gap:12px;margin-top:24px}
    .btn-modal{flex:1;padding:12px;border-radius:6px;border:none;font-weight:700;cursor:pointer;font-size:.95rem;transition:.2s}
    .btn-cancel{background:#fff;border:1px solid var(--color-border);color:var(--color-text-main)}
    .btn-cancel:hover{background:#F7FAFA}
    .btn-confirm{background:#25D366;color:#fff}
    .btn-confirm:hover{background:#16A34A}

    .hidden{display:none!important}
    .state-box{text-align:center;padding:60px 20px;color:var(--color-text-muted);display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
    .spinner{width:44px;height:44px;border:4px solid var(--color-pink-light);border-top-color:var(--color-pink);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="app-container">
  <header class="amz-header">
      <div class="header-left">
          <button onclick="goBack()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
          <span class="page-title">Product Details</span>
      </div>
      <div class="header-actions">
          <button id="wishlist-btn" onclick="toggleWishlist()" class="action-btn"><i id="fav-icon" class="fa-regular fa-heart"></i></button>
          <button onclick="shareProduct()" class="action-btn"><i class="fa-solid fa-share-nodes"></i></button>
      </div>
  </header>

  <div id="loader" class="state-box">
      <div class="spinner"></div>
      <span style="font-weight:600;color:#0F1111">Loading Product...</span>
  </div>

  <div id="error-screen" class="state-box hidden">
      <i class="fa-solid fa-triangle-exclamation" style="font-size:3rem;color:#C40000;margin-bottom:16px"></i>
      <h3 style="color:#0F1111;font-weight:800;margin-bottom:8px">Product Not Found</h3>
      <p style="color:#565959">The item you are looking for may have been removed.</p>
      <button onclick="window.location.href='index.html'" style="margin-top:20px;padding:10px 24px;background:#fff;border:1px solid #D5D9D9;border-radius:6px;font-weight:600;cursor:pointer">Go Back</button>
  </div>

  <div id="main-content" class="main-layout hidden">
      <div class="left-col">
          <!-- Main Image & Gallery -->
          <div class="content-block image-container">
              <div class="main-img-wrapper">
                  <div id="discount-badge" class="discount-badge-hero flash-offer hidden"></div>
                  <img id="prod-img" class="product-img" src="" alt="Product Image">
              </div>
              <div id="thumb-gallery" class="thumb-gallery hidden"></div>
          </div>
      </div>
      
      <div class="right-col">
          <div class="content-block">
              <span id="condition-badge" class="condition-badge cond-new">New</span>
              <h1 id="prod-name" class="prod-title">--</h1>
              
              <!-- Stock Indicator -->
              <div id="stock-status" class="stock-status"></div>

              <div class="price-row">
                  <span id="current-price" class="current-price">--</span>
                  <span id="old-price" class="old-price hidden"></span>
              </div>
              
              <!-- Dynamic Attributes Grid -->
              <div id="attributes-container" class="attr-grid hidden"></div>
          </div>

          <div class="content-block" style="flex:1">
              <div class="section-header">Description</div>
              <p id="prod-desc" class="description-text">--</p>
              
              <div style="margin-top:30px;font-size:.85rem;color:#888C8C;display:flex;align-items:center;gap:6px">
                  <i class="fa-solid fa-store" style="color:var(--color-pink)"></i> Sold by <span id="shop-name-link" style="font-weight:700;cursor:pointer;color:#007185;text-decoration:underline">Loading...</span>
              </div>
          </div>
      </div>
  </div>

  <div class="bottom-bar" id="bottom-action-bar" style="display:none">
      <button id="btn-contact-merchant" onclick="showSecurityModal()" class="btn-whatsapp">
          <i class="fa-brands fa-whatsapp" style="font-size:1.4rem"></i> Message Merchant
      </button>
  </div>
</div>

<div id="security-modal" class="modal-overlay">
  <div class="modal-card">
      <div style="width:64px;height:64px;background:var(--color-pink-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
          <i class="fa-solid fa-shield-halved" style="font-size:1.8rem;color:var(--color-pink)"></i>
      </div>
      <h3 style="margin-bottom:10px;font-size:1.25rem;color:#0F1111;font-weight:800">Security Notice</h3>
      <p style="font-size:.9rem;color:#565959;line-height:1.5">
          To protect merchants from spam, your User ID will be securely recorded. Please ensure this inquiry is business-related.
      </p>
      <div class="modal-actions">
          <button class="btn-modal btn-cancel" onclick="hideSecurityModal()">Cancel</button>
          <button class="btn-modal btn-confirm" onclick="launchWhatsApp()">Continue to Chat</button>
      </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL="https://xdchacdjcgazyckacbpc.supabase.co",SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkY2hhY2RqY2dhenlja2FjYnBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1NDA2MzMsImV4cCI6MjA4NTExNjYzM30.41V3RaUX-ii-EHysbcVpUCgm0-RsNmuOb8FmYsz72Ow";
    let client,currentProduct=null,currentShop=null,currentUser=null,isInWishlist=!1;
    const params=new URLSearchParams(window.location.search),productId=params.get('id');

    function goBack(){document.referrer&&document.referrer.includes(window.location.hostname)?window.history.back():currentProduct&&currentProduct.shop_id?window.location.href=`shop-detail.html?id=${currentProduct.shop_id}`:window.location.href='index.html'}

    window.onload=async()=>{
        if('undefined'==typeof supabase)return;
        client=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
        if(!productId)return document.getElementById('loader').classList.add('hidden'),void document.getElementById('error-screen').classList.remove('hidden');
        
        client.auth.getSession().then(({data:{session:e}})=>{e&&(currentUser=e.user,checkWishlistStatus())});
        
        const e=`ctm_prod_v32_${productId}`,t=localStorage.getItem(e);
        if(t)try{renderUI(JSON.parse(t))}catch(e){console.error("Cache error",e),document.getElementById('loader').style.display='flex'}else document.getElementById('loader').style.display='flex';
        fetchFreshData(e,t)
    };

    async function fetchFreshData(e,t){
        try{
            const{data:n,error:o}=await client.from('products').select('*').eq('id',productId).single();
            if(o||!n)throw new Error("Product fetch failed.");
            currentProduct=n;let r=null;
            if(n.shop_id){const{data:e}=await client.from('shops').select('id, name, whatsapp').eq('id',n.shop_id).maybeSingle();e&&(currentShop=e,r=e)}
            const c={product:n,shop:r},s=JSON.stringify(c);
            s!==t?(localStorage.setItem(e,s),renderUI(c)):!t&&renderUI(c)
        }catch(e){console.error(e),!t&&(document.getElementById('loader').classList.add('hidden'),document.getElementById('error-screen').classList.remove('hidden'))}
    }

    function renderUI(e){
        document.getElementById('loader').classList.add('hidden'),document.getElementById('main-content').classList.remove('hidden');
        currentProduct=e.product,currentShop=e.shop;const t=e.product;
        
        // Setup Images
        document.getElementById('prod-img').src=t.image_url||'https://via.placeholder.com/800x800?text=No+Image';
        const imgArr = [t.image_url, t.image_url_2, t.image_url_3].filter(Boolean);
        const gal = document.getElementById('thumb-gallery');
        if(imgArr.length > 1) {
            gal.innerHTML = imgArr.map((img, i) => `<img src="${img}" class="thumb-img ${i===0?'active':''}" onclick="swapImage('${img}', this)">`).join('');
            gal.classList.remove('hidden');
        } else {
            gal.classList.add('hidden');
        }
        
        // Badges & Title
        const n=document.getElementById('condition-badge');
        n.textContent=t.condition||'New',n.className='Fairly Used'===t.condition?'condition-badge cond-used':'condition-badge cond-new',document.getElementById('prod-name').textContent=t.name,document.getElementById('prod-desc').textContent=t.description||"No description provided by the merchant.";
        
        // Stock Status
        const stockEl = document.getElementById('stock-status');
        const btnContact = document.getElementById('btn-contact-merchant');
        if(t.stock_count > 5) {
            stockEl.textContent = 'In Stock';
            stockEl.className = 'stock-status stock-ok';
            btnContact.disabled = false;
            btnContact.innerHTML = '<i class="fa-brands fa-whatsapp" style="font-size:1.4rem"></i> Message Merchant';
        } else if(t.stock_count > 0) {
            stockEl.textContent = `Only ${t.stock_count} left in stock - order soon.`;
            stockEl.className = 'stock-status stock-low';
            btnContact.disabled = false;
            btnContact.innerHTML = '<i class="fa-brands fa-whatsapp" style="font-size:1.4rem"></i> Message Merchant';
        } else {
            stockEl.textContent = 'Currently unavailable.';
            stockEl.className = 'stock-status stock-out';
            btnContact.disabled = true;
            btnContact.innerHTML = '<i class="fa-solid fa-ban" style="font-size:1.4rem"></i> Out of Stock';
        }

        // Price & Discount
        const o=document.getElementById('current-price'),r=document.getElementById('old-price'),c=document.getElementById('discount-badge'),s=e=>"₦"+Number(e).toLocaleString();
        if(t.discount_price&&t.discount_price<t.price){
            const e=Math.round((t.price-t.discount_price)/t.price*100);
            o.textContent=s(t.discount_price),o.classList.add('flash-price'),r.textContent=s(t.price),r.classList.remove('hidden'),c.textContent=`-${e}% OFF`,c.classList.remove('hidden')
        }else o.textContent=s(t.price),o.classList.remove('flash-price'),r.classList.add('hidden'),c.classList.add('hidden');
        
        // Attributes Grid
        const attrBox = document.getElementById('attributes-container');
        if(t.attributes && Object.keys(t.attributes).length > 0) {
            attrBox.innerHTML = Object.entries(t.attributes).map(([key, val]) => {
                const cleanKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                return `<div class="attr-row"><span class="attr-key">${cleanKey}</span><span class="attr-val">${val}</span></div>`;
            }).join('');
            attrBox.classList.remove('hidden');
        } else {
            attrBox.classList.add('hidden');
        }

        if(currentShop){
            const e=document.getElementById('shop-name-link');
            e.textContent=currentShop.name,e.onclick=()=>window.location.href=`shop-detail.html?id=${currentShop.id}`,currentShop.whatsapp&&(document.getElementById('bottom-action-bar').style.display='flex')
        }
    }

    function swapImage(src, el) {
        document.getElementById('prod-img').src = src;
        document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    async function checkWishlistStatus(){if(!currentUser)return;try{const{data:e}=await client.from('wishlist').select('id').eq('user_id',currentUser.id).eq('product_id',productId).maybeSingle();e&&(isInWishlist=!0,updateWishlistIcons())}catch(e){console.error("Wishlist check error",e)}}
    function updateWishlistIcons(){const e=document.getElementById('wishlist-btn'),t=document.getElementById('fav-icon');t.className=`${isInWishlist?'fa-solid':'fa-regular'} fa-heart`,isInWishlist?e.classList.add('active'):e.classList.remove('active')}
    async function toggleWishlist(){if(!currentUser)return alert("Please login to save items to your wishlist.");isInWishlist=!isInWishlist,updateWishlistIcons();try{isInWishlist?await client.from('wishlist').insert({user_id:currentUser.id,product_id:productId}):await client.from('wishlist').delete().eq('user_id',currentUser.id).eq('product_id',productId)}catch(e){isInWishlist=!isInWishlist,updateWishlistIcons(),alert("Failed to update wishlist.")}}
    function showSecurityModal(){currentShop?.whatsapp?document.getElementById('security-modal').classList.add('active'):alert("This merchant hasn't provided a WhatsApp number.")}
    function hideSecurityModal(){document.getElementById('security-modal').classList.remove('active')}
    async function launchWhatsApp(){hideSecurityModal(),currentUser&&currentShop&&client.from('whatsapp_clicks').insert({clicker_id:currentUser.id,shop_id:currentShop.id,product_id:productId});let e=currentShop.whatsapp.replace(/\D/g,'');e.startsWith('0')&&(e='234'+e.substring(1));const t=currentProduct.discount_price||currentProduct.price,n=`Hello *${currentShop.name}*, I found this on CTMerchant. I am interested in: ${currentProduct.name} (₦${t.toLocaleString()})`;window.open(`https://wa.me/${e}?text=${encodeURIComponent(n)}`,'_blank')}
    function shareProduct(){navigator.share?navigator.share({title:currentProduct?.name||'Product',text:`Check out this product on CTMerchant!`,url:window.location.href}):(navigator.clipboard.writeText(window.location.href),alert("Link copied to clipboard!"))}
</script>
</body>
</html>
