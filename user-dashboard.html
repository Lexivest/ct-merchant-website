<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Marketplace | CTMerchant</title>
  
  <!-- Favicons for browser tab -->
  <link rel="icon" type="image/png" href="https://goodtvrhszsnhcyigfoi.supabase.co/storage/v1/object/public/ctm_web_files/CT-Merchant.jpg">
  <link rel="apple-touch-icon" href="https://goodtvrhszsnhcyigfoi.supabase.co/storage/v1/object/public/ctm_web_files/CT-Merchant.jpg">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  
  <style>
    :root{--amz-dark:#131921;--amz-nav-bar:#232F3E;--color-pink:#db2777;--color-pink-hover:#be185d;--color-pink-light:rgba(219,39,119,.15);--amz-bg:#E3E6E6;--amz-link:#007185;--amz-link-hover:#C40000;--color-text-main:#0F1111}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent}
    body{background-color:var(--amz-bg);color:var(--color-text-main);overflow-x:hidden}
    .amz-header{background-color:var(--amz-dark);color:#fff;position:sticky;top:0;z-index:1000;display:flex;flex-direction:column}
    .amz-mobile-scroll-row{display:flex;align-items:center;gap:16px;padding:10px 16px;max-width:1600px;margin:0 auto;width:100%}
    .amz-logo{height:38px;border-radius:4px;object-fit:contain;cursor:pointer;flex-shrink:0}
    .amz-location{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid transparent;border-radius:4px;cursor:pointer;color:#fff;font-weight:700;font-size:.95rem;white-space:nowrap;transition:.2s;flex-shrink:0}
    .amz-location:hover{border-color:#fff}
    .amz-nav-item{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid transparent;border-radius:4px;cursor:pointer;color:#fff;font-weight:700;font-size:.95rem;white-space:nowrap;transition:.2s;position:relative;flex-shrink:0}
    .amz-nav-item.active,.amz-nav-item:hover{border-color:#fff}
    .notif-badge{position:absolute;top:-2px;right:-6px;background:#EF4444;color:#fff;font-size:.65rem;font-weight:800;padding:2px 6px;border-radius:10px;display:none;border:2px solid var(--amz-dark)}
    .header-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#fff;margin-left:4px}
    .desktop-search-wrap{position:relative;flex:1;margin:0 16px}
    .mobile-search-wrap{position:relative;display:none;margin:0 16px 10px;width:calc(100% - 32px)}
    .amz-search-block{display:flex;height:42px;border-radius:6px;overflow:hidden;border:3px solid transparent;transition:.2s;width:100%;background:#fff}
    .amz-search-block:focus-within{border-color:var(--color-pink)}
    .amz-search-select{background-color:#F3F4F6;border:none;border-right:1px solid #CDD2D3;padding:0 12px;color:#555;font-size:.85rem;font-weight:600;outline:0;cursor:pointer;max-width:140px;flex-shrink:0;text-overflow:ellipsis}
    .amz-search-select:hover{background-color:#DADADA;color:#0F1111}
    .amz-search-input{flex:1;min-width:0;padding:0 16px;border:none;outline:0;font-size:1rem;color:#0F1111}
    .amz-search-btn{width:52px;background-color:var(--color-pink);border:none;color:#fff;font-size:1.2rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .amz-search-btn:hover{background-color:var(--color-pink-hover)}
    .search-suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border-radius:8px;box-shadow:0 10px 25px rgba(0,0,0,.2);border:1px solid #D5D9D9;z-index:2000;display:none;flex-direction:column;overflow:hidden}
    .suggestion-item{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid #F3F4F6;color:#0F1111;font-size:.95rem;transition:background .2s}
    .suggestion-item:last-child{border-bottom:none}
    .suggestion-item:hover{background-color:#F7F7F7}
    .sugg-icon{color:#888C8C;font-size:1rem;width:20px;text-align:center}
    .sugg-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
    .sugg-type{font-size:.7rem;color:var(--color-pink);background:var(--color-pink-light);padding:2px 6px;border-radius:4px;font-weight:700}
    .amz-sub-header{background-color:var(--amz-nav-bar);padding:8px 16px;display:flex;align-items:center;font-size:.9rem;color:#fff;font-weight:600}
    .amz-category-filter{background-color:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 8px;border-radius:4px;outline:0;font-weight:600;font-size:.85rem;cursor:pointer;margin-right:12px;flex-shrink:0;max-width:130px}
    .amz-category-filter option{color:#0F1111;background:#fff}
    .amz-category-filter:hover{border-color:#fff}
    .ticker-wrapper{flex:1;overflow:hidden;position:relative;display:flex;align-items:center;gap:12px}
    .ticker-content{white-space:nowrap;animation:ticker 60s linear infinite;padding-left:100%;color:#fff}
    @keyframes ticker{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(-100%,0,0)}}
    @media (max-width:1024px){.desktop-search-wrap{display:none}.mobile-search-wrap{display:block}.amz-search-select{max-width:100px;padding:0 8px}.amz-mobile-scroll-row{padding:8px 12px;gap:8px;justify-content:space-between}.mobile-hide{display:none!important}.amz-nav-item{padding:6px 8px}.amz-category-filter{max-width:110px;margin-right:8px}}
    .content-body{max-width:1600px;margin:0 auto;width:100%;padding:0 0 40px}
    .screen{display:none;animation:fadeIn .3s ease}
    .screen.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .area-block-wrap,.cat-section-wrap,.promo-section-wrap{background-color:#fff;padding-top:16px;margin-bottom:8px}
    .h-scroll{display:flex;overflow-x:auto;gap:16px;padding:4px 16px 20px;scrollbar-width:none;-ms-overflow-style:none}
    .h-scroll::-webkit-scrollbar{display:none}
    .sec-title{font-size:1.35rem;font-weight:800;color:#0F1111;margin:0 0 12px;padding:0 16px;display:flex;align-items:center;gap:10px;white-space:nowrap;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
    .sec-title::-webkit-scrollbar{display:none}
    .sec-title::before{content:'';display:inline-block;width:6px;height:22px;background:var(--color-pink);border-radius:4px;flex-shrink:0}
    .premium-shop-card-wrap{display:flex;flex-direction:column;flex-shrink:0}
    .h-scroll .premium-shop-card-wrap{min-width:280px;width:85vw;max-width:340px}
    .premium-shop-card{background:#fff;padding:20px 16px;display:flex;flex-direction:column;cursor:pointer;height:100%;border-radius:8px;border:1px solid #D5D9D9;box-shadow:0 2px 4px rgba(0,0,0,.05);transition:background .2s,box-shadow .2s,transform .2s}
    .premium-shop-card:hover{background:#Fcfcfc;transform:translateY(-2px);box-shadow:0 8px 16px rgba(0,0,0,.08);border-color:#B0B5B5}
    .shop-card-title{font-size:1.15rem;font-weight:800;color:#0F1111;margin-bottom:16px;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .shop-image-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:16px;flex:1;width:100%}
    .shop-grid-item-wrap{display:flex;flex-direction:column;gap:4px;width:100%;overflow:hidden}
    .shop-grid-item{width:100%;aspect-ratio:1/1;background:#F7F7F7;display:block;overflow:hidden;border-radius:4px;position:relative}
    .shop-grid-item img{width:100%;height:100%;object-fit:cover;display:block}
    @keyframes pulse-badge{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(220,38,38,0)}50%{transform:scale(1.1);box-shadow:0 0 0 4px rgba(220,38,38,0)}}
    @keyframes highlight-price{0%,100%{color:var(--color-pink);text-shadow:none}50%{color:#f05;text-shadow:0 0 6px rgba(219,39,119,.4)}}
    .grid-badge{position:absolute;top:4px;left:4px;background:#DC2626;color:#fff;font-size:.65rem;font-weight:800;padding:2px 4px;border-radius:4px;z-index:2}
    .flash-offer{animation:pulse-badge 1.5s infinite ease-in-out}
    .flash-price{animation:highlight-price 1.5s infinite ease-in-out}
    .shop-grid-item.empty{border:1px dashed #D5D9D9;display:flex;align-items:center;justify-content:center}
    .shop-grid-caption{display:flex;flex-direction:column}
    .sg-name{font-size:.75rem;color:#0F1111;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sg-price{font-size:.8rem;font-weight:800;color:var(--color-pink);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sg-price-old{text-decoration:line-through;color:#888C8C;font-size:.65rem;font-weight:500;margin-right:4px}
    .shop-cta{font-size:.85rem;color:var(--amz-link);font-weight:600;display:inline-flex;text-decoration:none;margin-top:auto}
    .premium-shop-card:hover .shop-cta{color:var(--amz-link-hover);text-decoration:underline}
    .cat-grid{display:flex;flex-wrap:wrap;gap:12px;padding:0 16px 24px}
    .cat-chip{background:#fff;border:1px solid #D5D9D9;border-radius:50px;padding:6px 16px 6px 6px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s;box-shadow:var(--shadow-sm)}
    .cat-chip:hover{background:#F7F7F7;border-color:var(--color-pink);transform:translateY(-2px);box-shadow:var(--shadow-md)}
    .cat-chip img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid #E5E7EB}
    .cat-chip span{font-size:.85rem;font-weight:700;color:#0F1111}
    .tool-block-wrap{background:#fff;padding:24px 16px}
    .svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
    .svc-card{background:#fff;padding:20px 16px;border-radius:8px;text-align:center;border:1px solid #D5D9D9;cursor:pointer;transition:.2s}
    .svc-card:hover{background:#F7F7F7}
    .svc-icon{width:48px;height:48px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#565959}
    .form-group{margin-bottom:16px;text-align:left}
    .form-label{display:block;margin-bottom:6px;font-weight:700;font-size:.9rem;color:#0F1111}
    .form-input{width:100%;padding:10px 14px;border:1px solid #888C8C;border-radius:4px;font-size:1rem;box-shadow:0 1px 2px rgba(15,17,17,.15) inset}
    .form-input:focus{outline:0;border-color:var(--color-pink);box-shadow:0 0 0 3px var(--color-pink-light)}
    .btn-brand{background:var(--color-pink);border:1px solid var(--color-pink-hover);border-radius:8px;padding:10px 16px;color:#fff;font-weight:600;cursor:pointer;box-shadow:0 2px 5px 0 rgba(219,39,119,.3);transition:.2s}
    .btn-brand:hover{background:var(--color-pink-hover)}
    .btn-brand-alt{background:#fff;border:1px solid #D5D9D9;border-radius:8px;padding:10px 16px;color:#0F1111;font-weight:600;cursor:pointer;box-shadow:0 2px 5px 0 rgba(213,217,217,.5);transition:.2s}
    .btn-brand-alt:hover{background:#F7FAFA}
    .avatar-edit-box{position:relative;width:110px;height:110px;margin:0 auto;border-radius:50%;overflow:hidden;cursor:pointer;border:2px solid #D5D9D9}
    .avatar-edit-box img{width:100%;height:100%;object-fit:cover}
    .avatar-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;opacity:0;transition:.2s}
    .avatar-edit-box:hover .avatar-overlay{opacity:1}
    .crop-overlay{position:fixed;inset:0;background:rgba(17,24,39,.95);z-index:5000;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:.3s ease;backdrop-filter:blur(5px)}
    .crop-overlay.active{opacity:1;visibility:visible}
    .crop-header-bar{display:flex;justify-content:space-between;align-items:center;padding:20px;background:rgba(0,0,0,.5);color:#fff}
    .crop-title{font-weight:700;font-size:1.2rem}
    .crop-workspace{flex:1;position:relative;width:100%;overflow:hidden;display:flex;justify-content:center;align-items:center;padding:20px}
    .crop-workspace img{max-width:100%;max-height:100%;display:block}
    .crop-footer-bar{padding:20px;background:rgba(0,0,0,.5);display:flex;gap:16px;justify-content:center}
  </style>
</head>
<body>
  <header class="amz-header">
      <div class="amz-mobile-scroll-row">
          <img src="https://goodtvrhszsnhcyigfoi.supabase.co/storage/v1/object/public/ctm_web_files/CT-Merchant.jpg" class="amz-logo" alt="Logo" onclick="window.location.reload()">
          <div class="amz-location mobile-hide"><i class="fa-solid fa-location-dot"></i> <span id="header-city">...</span></div>
          <div class="desktop-search-wrap mobile-hide">
              <div class="amz-search-block">
                  <select class="amz-search-select" id="search-area-desktop" onchange="navigateArea(this.value)"><option value="all">All Areas</option></select>
                  <input type="text" class="amz-search-input" id="search-input-desktop" placeholder="Search shops and products..." autocomplete="off" oninput="handleLiveSearch('desktop')" onkeypress="if(event.key==='Enter') executeSearch('desktop')">
                  <button class="amz-search-btn" onclick="executeSearch('desktop')"><i class="fa-solid fa-magnifying-glass"></i></button>
              </div>
              <div class="search-suggestions" id="sugg-desktop"></div>
          </div>
          <div class="amz-nav-item active" onclick="switchScreen('market', this)" title="Repository">
              <i class="fa-solid fa-house" style="font-size:1.1rem"></i><span class="mobile-hide">Repository</span>
          </div>
          <div class="amz-nav-item" onclick="switchScreen('services', this)" title="Services">
              <i class="fa-solid fa-table-cells-large" style="font-size:1.1rem"></i><span class="mobile-hide">Services</span>
          </div>
          <div class="amz-nav-item" onclick="switchScreen('notifications', this)">
              <i class="fa-regular fa-bell" style="font-size:1.2rem"></i><span class="mobile-hide" style="margin-left:6px">Alerts</span><span id="badge-count" class="notif-badge">0</span>
          </div>
          <div class="amz-nav-item" onclick="switchScreen('profile', this)" style="padding:4px 8px">
              <img id="header-avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" class="header-avatar">
          </div>
          <div class="amz-nav-item" onclick="window.location.href='shop-index.html'" title="Shop Index"><i class="fa-solid fa-arrow-down-a-z" style="font-size:1.1rem"></i></div>
      </div>
      <div class="mobile-search-wrap">
          <div class="amz-search-block">
              <select class="amz-search-select" id="search-area-mobile" onchange="navigateArea(this.value)"><option value="all">All Areas</option></select>
              <input type="text" class="amz-search-input" id="search-input-mobile" placeholder="Search CTMerchant..." autocomplete="off" oninput="handleLiveSearch('mobile')" onkeypress="if(event.key==='Enter') executeSearch('mobile')">
              <button class="amz-search-btn" onclick="executeSearch('mobile')"><i class="fa-solid fa-magnifying-glass"></i></button>
          </div>
          <div class="search-suggestions" id="sugg-mobile"></div>
      </div>
      <div class="amz-sub-header">
          <select class="amz-category-filter" id="filter-category" onchange="navigateCategory(this.value)"><option value="all">All Categories</option></select>
          <div class="ticker-wrapper" id="header-ticker" style="display:none"><div id="ticker-text" class="ticker-content"></div></div>
      </div>
  </header>

  <main class="content-body">
      <div id="market" class="screen active">
          <div id="initial-loader" style="display:none;text-align:center;padding:60px 0;color:#888C8C"><i class="fa-solid fa-circle-notch fa-spin" style="font-size:2.5rem;color:var(--color-pink)"></i></div>
          <div id="promo-list" class="promo-section-wrap h-scroll" style="display:none"></div>
          <div id="featured-section" class="area-block-wrap" style="display:none">
              <h2 class="sec-title">Featured Shops <span style="color:var(--color-pink);font-size:.85em;font-weight:700">(Top Rated)</span></h2>
              <div id="featured-list" class="h-scroll"></div>
          </div>
          <div id="areas-container"></div>
          <div class="cat-section-wrap" id="category-container" style="display:none">
              <h2 class="sec-title">Browse Categories</h2>
              <div id="category-list" class="cat-grid"></div>
          </div>
      </div>
      <div id="services" class="screen">
          <div class="tool-block-wrap">
              <h2 class="sec-title" style="padding:0;margin-bottom:20px">Services & Tools</h2>
              <div class="svc-grid">
                  <div id="myshop-card" class="svc-card" onclick="handleShopClick()"><div class="svc-icon"><i class="fa-solid fa-store"></i></div><strong>Loading...</strong></div>
                  <div class="svc-card" onclick="window.location.href='wishlist.html'"><div class="svc-icon"><i class="fa-solid fa-heart" style="color:var(--color-pink)"></i></div><strong>Wishlist</strong><div id="wishlist-count" style="font-size:.8rem;color:#565959;margin-top:4px">...</div></div>
                  <div class="svc-card" onclick="window.location.href='help-support.html'"><div class="svc-icon"><i class="fa-solid fa-headset" style="color:#007185"></i></div><strong>Support</strong></div>
                  <div class="svc-card" onclick="window.location.href='faq.html'"><div class="svc-icon"><i class="fa-solid fa-circle-question" style="color:#007185"></i></div><strong>FAQ</strong></div>
                  <div class="svc-card" onclick="window.location.href='report-abuse.html'"><div class="svc-icon"><i class="fa-solid fa-triangle-exclamation" style="color:#C40000"></i></div><strong>Report Abuse</strong></div>
              </div>
          </div>
      </div>
      <div id="profile" class="screen">
          <div id="profile-view" style="max-width:600px;margin:20px auto;background:#fff;padding:40px;border-radius:8px;border:1px solid #D5D9D9;text-align:center">
              <img id="profile-avatar-lg" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" style="width:120px;height:120px;border-radius:50%;margin-bottom:16px;border:2px solid #D5D9D9;object-fit:cover">
              <h2 id="profile-name" style="font-size:1.8rem;color:#0F1111;margin-bottom:8px">Loading...</h2>
              <p id="profile-phone" style="color:#565959;font-weight:500;margin-bottom:4px"></p>
              <p id="profile-email" style="color:#565959;margin-bottom:24px;font-size:.95rem">...</p>
              <div style="display:flex;justify-content:center;gap:12px"><button class="btn-brand" onclick="openEditProfile()">Edit Profile</button><button class="btn-brand-alt" onclick="handleLogout()">Sign Out</button></div>
          </div>
          <div id="profile-edit" style="display:none;max-width:600px;margin:20px auto;background:#fff;padding:30px;border-radius:8px;border:1px solid #D5D9D9">
              <h3 style="margin-bottom:24px;font-size:1.4rem">Edit Profile</h3>
              <div style="text-align:center;margin-bottom:24px">
                  <div class="avatar-edit-box" onclick="document.getElementById('file-avatar').click()">
                      <img id="edit-avatar-preview" src="" alt="Avatar"><div class="avatar-overlay"><i class="fa-solid fa-camera"></i></div>
                  </div>
                  <input type="file" id="file-avatar" hidden accept="image/*" onchange="handleAvatarSelect(event)">
                  <p style="font-size:.8rem;color:#565959;margin-top:8px;font-weight:600">Tap photo to update (Max 500KB)</p>
              </div>
              <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="edit-name" class="form-input"></div>
              <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" id="edit-phone" class="form-input"></div>
              <div class="form-group"><label class="form-label">City</label><select id="edit-city" onchange="handleCityChange(this.value)" class="form-input" style="background:#fff"><option value="">Select City</option></select></div>
              <div class="form-group" style="margin-bottom:24px"><label class="form-label">Area</label><select id="edit-area" class="form-input" style="background:#fff"><option value="">Select Area</option></select></div>
              <p id="edit-error" style="color:#C40000;font-size:.9rem;margin-bottom:16px;display:none"></p>
              <div style="display:flex;gap:12px"><button id="btn-save" class="btn-brand" style="flex:1" onclick="saveProfile()">Save Changes</button><button class="btn-brand-alt" style="flex:1" onclick="cancelEdit()">Cancel</button></div>
          </div>
      </div>
      <div id="notifications" class="screen">
          <div class="tool-block-wrap">
              <h2 class="sec-title" style="padding:0;margin-bottom:20px">Alerts & Notifications</h2>
              <div id="notif-list" style="display:flex;flex-direction:column;gap:12px;max-width:800px"><p style="color:#565959">Loading notifications...</p></div>
          </div>
      </div>
  </main>

  <div id="avatar-crop-modal" class="crop-overlay">
      <div class="crop-header-bar"><div class="crop-title"><i class="fa-solid fa-crop-simple"></i> Adjust Avatar</div><button type="button" onclick="closeAvatarCropModal()" style="background:0 0;border:none;color:#fff;font-size:1.5rem;cursor:pointer"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="crop-workspace"><img id="avatar-crop-image" src=""></div>
      <div class="crop-footer-bar"><button type="button" class="btn-brand-alt" onclick="closeAvatarCropModal()">Cancel</button><button type="button" class="btn-brand" onclick="applyAvatarCrop()">Apply Crop</button></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
